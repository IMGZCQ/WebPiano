name: Publish and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: '选择构建类型'
        required: true
        default: 'docker_and_release'
        type: choice
        options:
          - docker_and_release
          - docker
          - release
      tag_name:
        description: '输入版本号(无需带v，如0.2.2)'
        required: true
        default: '0.2.2'
      push_latest:
        description: '是否同时推送latest标签?'
        required: false
        default: true
        type: boolean

env:
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_IMAGE_NAME: imgzcq/webpiano
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GOTOOLCHAIN: local

jobs:
  # 统一提取版本号，供两个job复用
  get-version:
    runs-on: ubuntu-latest
    outputs:
      ver: ${{ steps.tag.outputs.full_tag }}
      ver_clean: ${{ steps.tag.outputs.clean_tag }}
    steps:
      - name: Parse version tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # tag推送触发，直接使用git tag
            FULL_TAG=${{ github.ref_name }}
          else
            FULL_TAG=${{ inputs.tag_name }}
          fi
          CLEAN_TAG=${FULL_TAG#v}
          echo "full_tag=$FULL_TAG" >> $GITHUB_OUTPUT
          echo "clean_tag=$CLEAN_TAG" >> $GITHUB_OUTPUT

  docker:
    name: Build and Push Docker
    needs: get-version
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.build_type == 'docker' || inputs.build_type == 'docker_and_release'))
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Check DockerHub凭证
        id: check_dockerhub
        run: |
          if [ -z "$DH_USER" ] || [ -z "$DH_TOKEN" ]; then
            echo "::warning::缺少DOCKERHUB_USERNAME / DOCKERHUB_TOKEN，跳过镜像推送"
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login DockerHub
        if: steps.check_dockerhub.outputs.has_creds == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push 多架构镜像
        if: steps.check_dockerhub.outputs.has_creds == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # 修复版本取值：统一从前置job拿版本，不再依赖inputs
          tags: |
            ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}:${{ needs.get-version.outputs.ver }}
            ${{ inputs.push_latest == true && format('{0}/{1}:latest', env.DOCKERHUB_REGISTRY, env.DOCKERHUB_IMAGE_NAME) || '' }}
          # 条件追加latest标签，不会产生空行
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 可选：把版本传入Dockerfile构建参数
          build-args: VERSION=${{ needs.get-version.outputs.ver }}

  release:
    name: Build Binaries & Create GitHub Release
    needs: get-version
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.build_type == 'release' || inputs.build_type == 'docker_and_release'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: false

      # ========== 此处全部替换成打包逻辑，其余不动 ==========
      - name: 交叉编译全平台二进制并打包（附带static目录）
        run: |
          VERSION=${{ needs.get-version.outputs.ver }}
          LDFLAGS="-s -w -X main.Version=$VERSION"
          mkdir -p dist

          # Windows amd64 → zip
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/webpiano-windows-amd64.exe main.go
          cp -r static dist/
          cd dist && zip -r ../webpiano-windows-amd64.zip . && cd ..
          rm -rf dist/*

          # Linux amd64 → tar.gz
          GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/webpiano-linux-amd64 main.go
          cp -r static dist/
          cd dist && tar -czf ../webpiano-linux-amd64.tar.gz . && cd ..
          rm -rf dist/*

          # Linux arm64 → tar.gz
          GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/webpiano-linux-arm64 main.go
          cp -r static dist/
          cd dist && tar -czf ../webpiano-linux-arm64.tar.gz . && cd ..
          rm -rf dist/*

          # Darwin amd64 → tar.gz
          GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/webpiano-darwin-amd64 main.go
          cp -r static dist/
          cd dist && tar -czf ../webpiano-darwin-amd64.tar.gz . && cd ..
          rm -rf dist/*

          # Darwin arm64 → tar.gz
          GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/webpiano-darwin-arm64 main.go
          cp -r static dist/
          cd dist && tar -czf ../webpiano-darwin-arm64.tar.gz . && cd ..
          rm -rf dist

      # 校验文件改为校验压缩包，唔再校验单个二进制
      - name: 生成SHA256校验文件
        run: |
          sha256sum *.zip *.tar.gz > sha256sums.txt

      # 上传文件改成全部压缩包 + 校验文件，删除单独exe
      - name: 创建GitHub Release上传制品
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.get-version.outputs.ver }}
          name: Release ${{ needs.get-version.outputs.ver }}
          files: |
            webpiano-windows-amd64.zip
            webpiano-linux-amd64.tar.gz
            webpiano-linux-arm64.tar.gz
            webpiano-darwin-amd64.tar.gz
            webpiano-darwin-arm64.tar.gz
            sha256sums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
